name: Waiting for response

on:
  issue_comment:
    types: [created]
  issues:
    types: [edited]
  pull_request_review_comment:
    types: [created]
  pull_request:
    types: [synchronize]

permissions:
  issues: write
  pull-requests: read

jobs:
  remove-label:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/github-script@v7
        with:
          script: |
            const label = 'waiting-for-response';
            const event = context.eventName;
            const payload = context.payload;

            const item = payload.issue || payload.pull_request;
            if (!item || !item.labels.some(l => l.name === label)) return;

            try {
              await github.rest.issues.removeLabel({
                owner: context.repo.owner,
                repo: context.repo.repo,
                issue_number: item.number,
                name: label,
              });
              console.log(`Removed '${label}' from #${item.number}`);
            } catch {
              console.log(`Label '${label}' not found on #${item.number}, skipping`);
            }
