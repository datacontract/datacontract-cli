apiVersion: v3.1.0
kind: DataContract
id: azure-blob-file-orders
name: Azure Blob Orders Files
version: 1.0.0
status: active
description:
  purpose: Data contract for order JSON files stored in Azure Blob Storage.

servers:
  - server: production
    type: azure
    format: jpg
    location: https://myaccount.blob.core.windows.net/mycontainer/raw/orders/

schema:
  - name: orders_files
    logicalType: blob
    description: Nightly order exports — one JSON file per batch run.
    # Schema-level quality: expect at least 1 file in the prefix
    quality:
      - metric: rowCount
        mustBeGreaterOrEqualTo: 1
    # Each property corresponds to a BlobProperties attribute (azure.storage.blob)
    properties:
      - name: name
        logicalType: string
        description: Blob path within the container.
        required: true

      - name: size
        logicalType: integer
        description: Blob size in bytes.
        required: true
        quality:
          - name: max-size-5mib
            mustBeLessOrEqualTo: 5242880   # 5 MiB

      - name: lastModified
        logicalType: timestamp
        description: UTC timestamp of the last modification.
        required: true

      - name: contentType
        logicalType: string
        description: MIME type of the blob. Parameters are stripped before comparison.
        required: true
        quality:
          - name: expected-mime-type
            mustBe: "image/jpeg"

      - name: blobType
        logicalType: string
        description: Azure blob storage type.
        quality:
          - name: block-blob-only
            mustBe: "BlockBlob"

      - name: etag
        logicalType: string
        description: Entity tag for cache validation.
