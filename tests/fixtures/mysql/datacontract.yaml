dataContractSpecification: 1.2.1
id: mysql
info:
  title: mysql
  version: 0.0.1
  owner: my-domain-team
servers:
  my-dataproduct/mysql:
    type: mysql
    host: localhost
    port: 3306
    database: test
models:
