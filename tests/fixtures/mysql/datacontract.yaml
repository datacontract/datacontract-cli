    type: table
    fields:
      field_one:
        type: varchar
        required: true
        unique: true
        pattern: "[A-Za-z]{2}-\\d{3}-[A-Za-z]{2}$"
      field_two:
        type: integer
        minimum: 10
      field_three:
        type: timestamp
