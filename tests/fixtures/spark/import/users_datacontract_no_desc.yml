version: 1.0.0
kind: DataContract
apiVersion: v3.1.0
id: my-data-contract
name: My Data Contract
status: draft
servers:
- server: local
  type: dataframe
schema:
- name: users
  physicalType: table
  logicalType: object
  physicalName: users
  properties:
  - name: id
    physicalType: string
    logicalType: string
  - name: name
    physicalType: string
    description: First and last name of the customer
    logicalType: string
  - name: address
    physicalType: struct<number:int,street:string,city:string>
    logicalType: object
    properties:
    - name: number
      physicalType: int
      logicalType: integer
    - name: street
      physicalType: string
      logicalType: string
    - name: city
      physicalType: string
      logicalType: string
  - name: tags
    physicalType: array<string>
    logicalType: array
    items:
      name: items
      physicalType: string
      logicalType: string
  - name: metadata
    physicalType: map<string,struct<value:string,type:string,timestamp:bigint,source:string>>
    logicalType: object
