dataContractSpecification: 1.2.1
id: sqlserver
info:
  title: sqlserver
  version: 0.0.1
  owner: my-domain-team
servers:
  my-dataproduct/sqlserver:
    type: sqlserver
    host: localhost
    port: __PORT__
    database: tempdb
    schema: dbo
    driver: ODBC Driver 18 for SQL Server
models:
  my_table:
    type: table
    fields:
      field_one:
        type: varchar
        required: true
        unique: true
        pattern: "[A-Z][A-Z]-[0-9][0-9][0-9]-[A-Z][A-Z]"
      field_two:
        type: int
        minimum: 10
      field_three:
        type: timestamp
        config:
          sqlserverType: DATETIME2
      # Regression for #1354: a UUID column has logicalType string but
      # physicalType uniqueidentifier; the physical type must be verified
      # against the real native type rather than failing the string check.
      field_uuid:
        type: string
        config:
          sqlserverType: uniqueidentifier
